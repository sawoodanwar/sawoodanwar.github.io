<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found — Sawood Anwar, PhD</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0d1422;--surface:#15202f;--border:#243148;--heading:#eef2ff;--muted:#8796b4;--accent:#c9a96e;--accent2:#7eafd4;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--muted);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
      background-image:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(100,130,210,.10) 0%,transparent 65%);}
    .box{max-width:480px;}
    .code{
      font-family:'EB Garamond',Georgia,serif;
      font-size:6rem;font-weight:500;color:var(--accent);
      line-height:1;letter-spacing:-.02em;
      text-shadow:0 0 40px rgba(201,169,110,.18);
    }
    .rule{width:48px;height:2px;background:linear-gradient(90deg,var(--accent),transparent);border:none;margin:18px auto;}
    .title{font-family:'EB Garamond',Georgia,serif;font-size:1.5rem;color:var(--heading);margin-bottom:12px;}
    .desc{font-size:.93rem;line-height:1.8;margin-bottom:32px;}
    .btn{
      display:inline-flex;align-items:center;gap:8px;
      padding:10px 22px;border-radius:5px;
      border:1px solid rgba(201,169,110,.4);background:rgba(201,169,110,.07);
      color:var(--accent);font-size:.88rem;font-weight:500;
      text-decoration:none;transition:background .2s,border-color .2s;
    }
    .btn:hover{background:rgba(201,169,110,.14);border-color:var(--accent);}
    .ornament{font-size:.9rem;color:rgba(201,169,110,.25);margin-top:40px;letter-spacing:.4em;}
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <hr class="rule">
    <h1 class="title">Page Not Found</h1>
    <p class="desc">The page you are looking for does not exist or has been moved.<br>Return to the main profile to continue.</p>
    <a class="btn" href="/">&#8592; Back to Profile</a>
    <p class="ornament">&#8258;</p>
  </div>
</body>
</html>
